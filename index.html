<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALAXIA V5 | ULTRA</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #050505; color: #d1d1d1; font-family: 'Inter', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }
        #main-ui { display: flex; flex-direction: column; align-items: center; padding-top: 15vh; min-height: 160vh; }
        .interface { z-index: 10; text-align: center; background: rgba(10, 10, 10, 0.98); padding: 50px; border: 1px solid #1a1a1a; border-radius: 2px; width: 90%; max-width: 600px; box-shadow: 0 0 100px #000; }
        h1 { font-size: 3.5em; letter-spacing: 20px; color: #fff; margin: 0; font-weight: 100; }
        .sub { font-size: 0.6em; color: #333; letter-spacing: 5px; margin-bottom: 50px; text-transform: uppercase; }
        input { background: #000; border: 1px solid #222; padding: 15px; width: 85%; color: #fff; text-align: center; margin-bottom: 25px; outline: none; font-family: monospace; }
        button { background: transparent; color: #fff; border: 1px solid #fff; padding: 12px 50px; cursor: pointer; transition: 0.4s; letter-spacing: 2px; }
        button:hover { background: #fff; color: #000; }
        #proxy-frame { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 9999; background: #fff; }
        .ad-zone { margin-top: 300px; padding: 40px; border-top: 1px solid #111; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .ad-label { font-size: 9px; color: #222; margin-bottom: 20px; letter-spacing: 3px; }
    </style>
</head>
<body>
    <canvas id="mesh"></canvas>
    <iframe id="proxy-frame"></iframe>

    <div id="main-ui">
        <div class="interface">
            <h1>GALAXIA</h1>
            <div class="sub">V5 ULTRA // GUARDIAN BOT: ACTIVE</div>
            <input type="text" id="urlInput" placeholder="ENTER TARGET URL...">
            <br>
            <button onclick="launch()">INITIATE</button>
        </div>

        <div class="ad-zone">
            <div class="ad-label">ENCRYPTION SPONSOR</div>
            <div id="container-8065ba5f7df2d0f53a2bb888f1df4b3a"></div>
            <script async="async" data-cfasync="false" src="https://pl28845318.effectivegatecpm.com/8065ba5f7df2d0f53a2bb888f1df4b3a/invoke.js"></script>
        </div>
    </div>

    <script>
        // PANIC KEY: Press 'Q' to immediately jump to school work
        document.addEventListener('keydown', function(e) {
            if (e.key === 'q' || e.key === 'Q') {
                window.location.href = "https://hwb.gov.wales/";
            }
        });

        function launch() {
            let target = document.getElementById('urlInput').value.trim();
            if (!target) return;

            // Fix common URL errors to prevent DuckDuckGo redirects
            if (!target.includes('.')) target += ".com";
            if (!target.startsWith('http')) target = 'https://' + target;

            const workerUrl = `https://galaxia.williampitcher347.workers.dev?url=${encodeURIComponent(target)}`;
            
            const frame = document.getElementById('proxy-frame');
            const ui = document.getElementById('main-ui');
            
            ui.style.display = 'none';
            frame.style.display = 'block';
            frame.src = workerUrl;

            window.history.pushState(null, null, window.location.href);
        }

        // Mesh Logic
        const c = document.getElementById('mesh'), $ = c.getContext('2d');
        let w, h, pts = [];
        const init = () => { w = c.width = window.innerWidth; h = c.height = window.innerHeight; pts = []; for(let i=0; i<60; i++) pts.push({x:Math.random()*w, y:Math.random()*h, vx:(Math.random()-0.5)*0.3, vy:(Math.random()-0.5)*0.3}); };
        const draw = () => { $.clearRect(0,0,w,h); $.fillStyle = '#333'; pts.forEach(p => { p.x += p.vx; p.y += p.vy; if(p.x<0 || p.x>w) p.vx*=-1; if(p.y<0 || p.y>h) p.vy*=-1; $.beginPath(); $.arc(p.x, p.y, 1, 0, Math.PI*2); $.fill(); }); requestAnimationFrame(draw); };
        window.addEventListener('resize', init); init(); draw();
    </script>
</body>
</html>
