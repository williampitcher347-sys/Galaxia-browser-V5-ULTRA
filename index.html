<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Drive - Google Drive</title>
    <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com/docs/doclist/images/drive_2022q3_32dp.png">
    
    <style>
        :root {
            --bg: #020408;
            --accent: #4285f4;
            --border: #1b1f24;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg);
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Entry UI Panel */
        #portal-ui {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 1000;
            background: radial-gradient(circle at center, #0d1117 0%, #020408 100%);
            transition: transform 0.6s cubic-bezier(0.85, 0, 0.15, 1);
        }

        .container { text-align: center; width: 90%; max-width: 500px; }

        h1 {
            font-size: 3.5rem; letter-spacing: 15px; font-weight: 100;
            margin: 0; text-shadow: 0 0 15px rgba(66, 133, 244, 0.4);
        }

        .sub-text {
            font-size: 10px; color: #30363d; letter-spacing: 5px;
            margin-bottom: 40px; text-transform: uppercase;
        }

        input {
            width: 100%; padding: 20px; border-radius: 15px;
            border: 1px solid var(--border); background: #000;
            color: var(--accent); font-size: 18px; outline: none;
            text-align: center; font-family: 'Consolas', monospace;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(66,133,244,0.1); }

        /* The Browser Iframe */
        #browser-frame {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100vh; border: none;
            display: none; z-index: 1;
        }

        .ui-hidden { transform: translateY(-100%); pointer-events: none; }

        /* Loading Spinner */
        #loader {
            display: none; margin-top: 20px; border: 3px solid #111;
            border-top: 3px solid var(--accent); border-radius: 50%;
            width: 20px; height: 20px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="portal-ui">
        <div class="container">
            <h1>GALAXIA</h1>
            <div class="sub-text">History-Lock Enabled</div>
            <input type="text" id="urlInput" placeholder="ENTER DIRECT LINK" autofocus autocomplete="off">
            <center><div id="loader"></div></center>
        </div>
    </div>

    <iframe 
        id="browser-frame" 
        name="galaxia_window"
        allow="fullscreen; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; microphone; camera; midi; pointer-lock" 
        allowfullscreen>
    </iframe>

    <script>
        const PROXY_BASE = "https://galaxia.williampitcher347.workers.dev/?url=";
        const input = document.getElementById('urlInput');
        const ui = document.getElementById('portal-ui');
        const frame = document.getElementById('browser-frame');
        const loader = document.getElementById('loader');

        // NEW TAB HIJACKER: Forces sites to stay inside your frame
        window.open = function(url) {
            const proxiedUrl = PROXY_BASE + encodeURIComponent(url);
            frame.contentWindow.location.replace(proxiedUrl);
            return null; 
        };

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                let target = input.value.trim();
                
                if (target.includes('.') && !target.includes(' ')) {
                    if (!target.startsWith('http')) target = 'https://' + target;
                    
                    const finalUrl = PROXY_BASE + encodeURIComponent(target);

                    // Show loader and frame
                    loader.style.display = "block";
                    frame.style.display = "block";
                    
                    // GHOST REDIRECT: Wipes history trail
                    frame.contentWindow.location.replace(finalUrl);
                    
                    // Slide UI out after a short delay
                    setTimeout(() => {
                        ui.classList.add('ui-hidden');
                        loader.style.display = "none";
                        frame.focus();
                    }, 800);
                } else {
                    input.placeholder = "INVALID: USE FULL LINK";
                    input.value = "";
                    setTimeout(() => { input.placeholder = "ENTER DIRECT LINK"; }, 1500);
                }
            }
        });

        // THE PANIC KEY (ESC)
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                ui.classList.remove('ui-hidden');
                frame.style.display = "none";
                frame.src = "about:blank"; // Kills audio and session
                input.focus();
                input.value = "";
            }
        });

        // Ensure WASD/Mouse stays locked for games
        frame.onload = () => {
            if (ui.classList.contains('ui-hidden')) {
                frame.focus();
            }
        };
    </script>
</body>
</html>
