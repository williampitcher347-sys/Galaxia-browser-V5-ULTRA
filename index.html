<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALAXIA | TITAN ENGINE</title>
    <style>
        :root { --glow: #00ff88; --bg: #050505; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden; scroll-behavior: smooth;
        }

        /* ANIMATED MESH BACKGROUND */
        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.3;
            background: radial-gradient(at 0% 0%, #002211 0px, transparent 50%),
                        radial-gradient(at 100% 0%, #001122 0px, transparent 50%),
                        radial-gradient(at 100% 100%, #110022 0px, transparent 50%);
            filter: blur(80px); animation: drift 20s infinite alternate;
        }

        @keyframes drift {
            from { transform: scale(1); }
            to { transform: scale(1.2) rotate(5deg); }
        }

        #content-wrapper {
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; width: 100%; padding: 40px 20px;
        }

        /* GLASSMORPHISM UI BOX */
        .ui-container {
            margin-top: 10vh; text-align: center;
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(15px);
            padding: 60px 40px; border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%; max-width: 550px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: fadeIn 1.2s ease-out;
        }

        h1 { 
            font-weight: 800; letter-spacing: 12px; margin: 0; font-size: 2.8em; 
            background: linear-gradient(to right, #fff, var(--glow));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .status-dot {
            width: 8px; height: 8px; background: var(--glow); border-radius: 50%;
            display: inline-block; margin-right: 8px; box-shadow: 0 0 10px var(--glow);
        }

        input { 
            background: rgba(0,0,0,0.5); border: 1px solid #222; padding: 18px; 
            width: 100%; border-radius: 12px; color: #fff; text-align: center;
            outline: none; margin: 30px 0 20px 0; transition: 0.3s;
            font-size: 16px;
        }

        input:focus { border-color: var(--glow); box-shadow: 0 0 15px rgba(0,255,136,0.2); }

        button { 
            background: #fff; color: #000; border: none; padding: 15px 60px; 
            cursor: pointer; text-transform: uppercase; font-size: 12px; font-weight: bold;
            letter-spacing: 2px; border-radius: 12px; transition: 0.4s;
        }

        button:hover { background: var(--glow); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,255,136,0.3); }

        /* AD LAYER - PUSHED DOWN */
        .ad-shelf {
            margin-top: 100px; width: 100%; max-width: 900px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px; padding: 30px; text-align: center;
        }

        #proxy-frame { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100vw; height: 100vh; border: none; z-index: 99999; 
            background: #fff;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="mesh-bg"></div>
    <iframe id="proxy-frame" scrolling="yes" allowfullscreen="true"></iframe>

    <div id="content-wrapper">
        <div class="ui-container">
            <div style="font-size: 10px; letter-spacing: 4px; color: #555; margin-bottom: 10px;">
                <span class="status-dot"></span>SYSTEM ONLINE // V15.5
            </div>
            <h1>GALAXIA</h1>
            <input type="text" id="urlInput" placeholder="Enter target URL (e.g. youtube.com)">
            <br>
            <button onclick="launch()">Initiate Titan Bypass</button>
        </div>

        <div class="ad-shelf">
            <div style="font-size: 9px; color: #444; margin-bottom: 20px; letter-spacing: 2px;">SPONSORED NETWORK NODES</div>
            <div id="container-8065ba5f7df2d0f53a2bb888f1df4b3a"></div>
            <script async="async" data-cfasync="false" src="https://pl28845318.effectivegatecpm.com/8065ba5f7df2d0f53a2bb888f1df4b3a/invoke.js"></script>
        </div>
    </div>

    <script>
        function launch() {
            let val = document.getElementById('urlInput').value.trim();
            if(!val) return;
            if(!val.includes('.')) val += ".com";
            if(!val.startsWith('http')) val = "https://" + val;

            const workerUrl = "https://galaxia.williampitcher347.workers.dev/?url=" + encodeURIComponent(val);
            
            document.getElementById('content-wrapper').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('content-wrapper').style.display = 'none';
                const frame = document.getElementById('proxy-frame');
                frame.style.display = 'block';
                frame.src = workerUrl;
            }, 500);

            window.history.pushState(null, null, window.location.href);
        }

        window.addEventListener('keydown', e => {
            if(e.key === 'Q' && e.altKey) window.location.href = "https://hwb.gov.wales/";
        });
    </script>
</body>
</html>
