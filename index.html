<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALAXIA V5 | ULTRA</title>
    <style>
        body { 
            margin: 0; background: #050505; color: #d1d1d1; 
            font-family: 'Inter', sans-serif; min-height: 140vh; 
            display: flex; flex-direction: column; align-items: center; 
            overflow-x: hidden;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }

        .header-space { height: 15vh; }

        .interface { 
            z-index: 10; text-align: center; background: rgba(15, 15, 15, 0.95); 
            padding: 50px; border: 1px solid #222; border-radius: 4px; 
            width: 90%; max-width: 650px; box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        h1 { font-size: 3em; letter-spacing: 15px; margin: 0; font-weight: 200; color: #fff; }
        .sub { font-size: 0.6em; color: #444; letter-spacing: 4px; margin-bottom: 40px; }

        input { 
            background: #111; border: 1px solid #333; padding: 15px; 
            width: 80%; color: #fff; outline: none; text-align: center; margin-bottom: 20px;
        }

        button { 
            background: transparent; color: #fff; border: 1px solid #555; 
            padding: 12px 40px; cursor: pointer; transition: 0.3s; 
        }
        button:hover { background: #fff; color: #000; border-color: #fff; }

        /* Ad Zone - Pushed down for safety */
        .ad-zone {
            margin-top: 200px; padding: 20px; border-top: 1px solid #1a1a1a;
            width: 100%; display: flex; flex-direction: column; align-items: center;
        }
        .ad-label { font-size: 10px; color: #333; margin-bottom: 15px; letter-spacing: 2px; }
    </style>
</head>
<body>
    <canvas id="mesh"></canvas>
    <div class="header-space"></div>

    <div class="interface">
        <h1>GALAXIA</h1>
        <div class="sub">V5 ULTRA // CLOAK ACTIVE</div>
        
        <input type="text" id="urlInput" placeholder="ENTER URL...">
        <br>
        <button onclick="launch()">INITIATE</button>
    </div>

    <div class="ad-zone">
        <div class="ad-label">NETWORK SPONSOR</div>
        <div id="container-8065ba5f7df2d0f53a2bb888f1df4b3a"></div>
        <script async="async" data-cfasync="false" src="https://pl28845318.effectivegatecpm.com/8065ba5f7df2d0f53a2bb888f1df4b3a/invoke.js"></script>
    </div>

    <script>
        // HISTORY CLOAKER LOGIC
        // This ensures that clicking "Back" or checking history only shows the Galaxia Home
        window.onunload = function() {}; 
        if (window.history.replaceState) {
            window.history.replaceState(null, null, window.location.href);
        }

        function launch() {
            let target = document.getElementById('urlInput').value;
            if (!target) return;
            if (!target.startsWith('http')) target = 'https://' + target;

            // Cloak the launch: The browser thinks you're still on the home page
            const workerUrl = `https://galaxia.williampitcher347.workers.dev?url=${encodeURIComponent(target)}`;
            
            // This opens the proxy but tries to keep the history clean
            window.location.replace(workerUrl);
        }

        // Mesh Logic
        const c = document.getElementById('mesh'), $ = c.getContext('2d');
        let w, h, pts = [];
        const init = () => { w = c.width = window.innerWidth; h = c.height = window.innerHeight; pts = []; for(let i=0; i<60; i++) pts.push({x:Math.random()*w, y:Math.random()*h, vx:(Math.random()-0.5)*0.5, vy:(Math.random()-0.5)*0.5}); };
        const draw = () => {
            $.clearRect(0,0,w,h); $.fillStyle = '#444';
            pts.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0 || p.x>w) p.vx*=-1; if(p.y<0 || p.y>h) p.vy*=-1;
                $.beginPath(); $.arc(p.x, p.y, 1, 0, Math.PI*2); $.fill();
            });
            requestAnimationFrame(draw);
        };
        window.addEventListener('resize', init); init(); draw();
    </script>
</body>
</html>
