<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GALAXIA V5 | ULTRA</title>
    <style>
        body { margin: 0; background: #050505; color: #d1d1d1; font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.15; pointer-events: none; }
        
        .interface { 
            position: relative; z-index: 10; text-align: center; 
            background: rgba(10, 10, 10, 0.95); padding: 50px; 
            border: 1px solid #222; border-radius: 12px; 
            box-shadow: 0 0 60px rgba(0,0,0,1); backdrop-filter: blur(10px);
            width: 90%; max-width: 700px;
        }

        h1 { font-size: 3.5em; letter-spacing: 12px; color: #eee; margin: 0; font-weight: 200; }
        .sub { font-size: 0.7em; color: #444; letter-spacing: 3px; margin-bottom: 40px; text-transform: uppercase; }

        .input-group { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; }
        input { 
            background: #111; border: 1px solid #333; padding: 15px 20px; 
            width: 300px; border-radius: 4px; color: #fff; outline: none; transition: 0.4s;
            font-family: 'Courier New', monospace;
        }
        input:focus { border-color: #666; }

        button { 
            background: #222; color: #fff; border: 1px solid #444; padding: 15px 30px; 
            border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.3s;
            letter-spacing: 2px;
        }
        button:hover { background: #eee; color: #000; border-color: #eee; }

        /* BANNER AREA */
        #container-8065ba5f7df2d0f53a2bb888f1df4b3a {
            margin-top: 30px;
            min-height: 90px;
            border-top: 1px solid #1a1a1a;
            padding-top: 20px;
            overflow: hidden;
        }
        .ad-label { font-size: 8px; color: #222; margin-bottom: 8px; letter-spacing: 2px; }
    </style>
</head>
<body>
    <canvas id="mesh"></canvas>

    <div class="interface">
        <h1>GALAXIA</h1>
        <div class="sub">V5 ULTRA // SECURE NODE // V15 ENGINE</div>
        
        <div class="input-group">
            <input type="text" id="urlIn" placeholder="ENTER COORDINATES...">
            <button onclick="launch()">INITIATE</button>
        </div>

        <div class="ad-label">SYSTEM SPONSOR</div>
        <div id="container-8065ba5f7df2d0f53a2bb888f1df4b3a"></div>
        <script async="async" data-cfasync="false" src="https://pl28845318.effectivegatecpm.com/8065ba5f7df2d0f53a2bb888f1df4b3a/invoke.js"></script>
    </div>

    <script>
        function launch() {
            let target = document.getElementById('urlIn').value;
            if (!target) return;
            if (!target.startsWith('http')) target = 'https://' + target;
            const worker = "https://galaxia.williampitcher347.workers.dev";
            window.location.href = `${worker}?url=${encodeURIComponent(target)}`;
        }

        // Cinematic Mesh Background
        const c = document.getElementById('mesh'), $ = c.getContext('2d');
        let w, h, pts = [];
        const init = () => { w = c.width = window.innerWidth; h = c.height = window.innerHeight; pts = []; for(let i=0; i<60; i++) pts.push({x:Math.random()*w, y:Math.random()*h, vx:(Math.random()-0.5)*0.3, vy:(Math.random()-0.5)*0.3}); };
        const draw = () => {
            $.clearRect(0,0,w,h); $.fillStyle = '#444';
            pts.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0 || p.x>w) p.vx*=-1; if(p.y<0 || p.y>h) p.vy*=-1;
                $.beginPath(); $.arc(p.x, p.y, 1, 0, Math.PI*2); $.fill();
            });
            requestAnimationFrame(draw);
        };
        window.addEventListener('resize', init); init(); draw();
    </script>
</body>
</html>
