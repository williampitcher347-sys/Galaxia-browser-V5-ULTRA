<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyWay - Galaxia</title>
    <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com/docs/doclist/images/drive_2022q3_32dp.png">
    
    <style>
        :root {
            --bg: #05070a;
            --accent: #4285f4;
            --panel: #0d1117;
            --text: #e6edf3;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background: var(--bg);
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }

        /* The Main Entry UI */
        #portal-ui {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            background: radial-gradient(circle at center, #0d1117 0%, #05070a 100%);
            transition: transform 0.6s cubic-bezier(0.85, 0, 0.15, 1), opacity 0.4s;
        }

        .ui-container {
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        h1 {
            font-size: 3.5rem;
            letter-spacing: 15px;
            font-weight: 200;
            color: white;
            margin: 0 0 10px 0;
            text-shadow: 0 0 20px rgba(66, 133, 244, 0.3);
        }

        .version {
            font-size: 10px;
            color: #30363d;
            letter-spacing: 4px;
            margin-bottom: 40px;
        }

        input {
            width: 100%;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #30363d;
            background: #010409;
            color: var(--accent);
            font-size: 18px;
            outline: none;
            text-align: center;
            font-family: 'Consolas', monospace;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(66, 133, 244, 0.2);
        }

        /* The Browser Window (Iframe) */
        #browser-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            display: none;
            z-index: 1;
        }

        /* Panic/Hidden Class */
        .hidden {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }

        .status-footer {
            position: absolute;
            bottom: 20px;
            font-size: 11px;
            color: #30363d;
        }
    </style>
</head>
<body>

    <div id="portal-ui">
        <div class="ui-container">
            <h1>GALAXIA</h1>
            <div class="version">V5 ULTIMATE KERNEL</div>
            <input type="text" id="urlInput" placeholder="URL ENTRY REQUIRED" autofocus autocomplete="off">
            <div class="status-footer">SECURE CONNECTION | HISTORY-LOCK ACTIVE</div>
        </div>
    </div>

    <iframe id="browser-frame"></iframe>

    <script>
        const PROXY_BASE = "https://galaxia.williampitcher347.workers.dev/?url=";
        const input = document.getElementById('urlInput');
        const ui = document.getElementById('portal-ui');
        const frame = document.getElementById('browser-frame');

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                let target = input.value.trim();
                
                // Validate it's a link
                if (target.includes('.') && !target.includes(' ')) {
                    if (!target.startsWith('http')) target = 'https://' + target;

                    const finalUrl = PROXY_BASE + encodeURIComponent(target);

                    // 1. Show the frame
                    frame.style.display = "block";
                    
                    // 2. Load the URL using replace to kill the history trail
                    frame.contentWindow.location.replace(finalUrl);
                    
                    // 3. Slide the UI up
                    ui.classList.add('hidden');
                    
                    // 4. Focus on the frame for gaming
                    setTimeout(() => { frame.focus(); }, 500);
                } else {
                    // Flash error if it's just a search word
                    input.style.borderColor = "#f85149";
                    input.value = "";
                    input.placeholder = "DIRECT LINKS ONLY (.com, .net)";
                    setTimeout(() => { 
                        input.style.borderColor = "#30363d";
                        input.placeholder = "URL ENTRY REQUIRED";
                    }, 2000);
                }
            }
        });

        // THE PANIC KEY & RESET
        // Press 'Escape' to immediately hide the game and show the portal
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                ui.classList.remove('hidden');
                frame.style.display = "none";
                frame.src = "about:blank"; // Kills the audio/video immediately
                input.focus();
            }
        });

        // Listen for messages from the frame (advanced security)
        window.addEventListener('blur', () => {
            // This helps keep the focus inside for Roblox controls
            if (ui.classList.contains('hidden')) {
                frame.focus();
            }
        });
    </script>
</body>
</html>
