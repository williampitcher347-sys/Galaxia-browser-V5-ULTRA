<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALAXIA | Search & Bypass</title>
    <style>
        :root {
            --bg: #05070a;
            --accent: #4285f4;
            --text: #e8eaed;
            --input-bg: #17191d;
        }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at center, #1a1c24 0%, #05070a 100%);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 650px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 4rem;
            margin: 0 0 30px 0;
            letter-spacing: 12px;
            font-weight: 900;
            background: linear-gradient(to right, #4285f4, #8ab4f8, #c1d5f8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(66, 133, 244, 0.5));
        }

        .search-box {
            position: relative;
            width: 100%;
        }

        input {
            width: 100%;
            padding: 18px 30px;
            border-radius: 50px;
            border: 1px solid #333;
            background: var(--input-bg);
            color: white;
            font-size: 18px;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 25px rgba(66, 133, 244, 0.3), 0 8px 30px rgba(0,0,0,0.5);
            background: #1e2126;
        }

        .footer {
            margin-top: 40px;
            font-size: 11px;
            color: #5f6368;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #00ff41;
            border-radius: 50%;
            margin-right: 5px;
            box-shadow: 0 0 10px #00ff41;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>GALAXIA</h1>
        
        <div class="search-box">
            <input type="text" id="mainInput" placeholder="Enter URL or Search Query..." autofocus>
        </div>

        <div class="footer">
            <span class="status-dot"></span> Kernel: Galaxia-v4-Bypass
        </div>
    </div>

    <script>
        const PROXY_URL = "https://galaxia.williampitcher347.workers.dev/?url=";
        const input = document.getElementById('mainInput');

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = input.value.trim();
                if (!query) return;

                // Smart Router Logic
                const isUrl = query.includes('.') && !query.includes(' ');
                let finalDestination = "";

                if (isUrl) {
                    // Protocol check
                    let url = query;
                    if (!url.startsWith('http')) url = 'https://' + url;
                    
                    // Route through your worker
                    finalDestination = PROXY_URL + encodeURIComponent(url);
                } else {
                    // Route through Google IGU (Unblocked Search)
                    finalDestination = `https://www.google.com/search?q=${encodeURIComponent(query)}&igu=1`;
                }

                window.location.href = finalDestination;
            }
        });
    </script>
</body>
</html>
