<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Drive - Google Drive</title>
    <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com/docs/doclist/images/drive_2022q3_32dp.png">
    <style>
        :root { --bg: #05070a; --accent: #4285f4; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg); overflow: hidden; font-family: sans-serif; }
        #portal-ui {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
            background: radial-gradient(circle, #0d1117 0%, #05070a 100%);
            transition: 0.6s cubic-bezier(0.85, 0, 0.15, 1);
        }
        .container { text-align: center; width: 90%; max-width: 500px; }
        h1 { font-size: 3rem; letter-spacing: 12px; color: white; font-weight: 100; margin: 0; }
        input {
            width: 100%; padding: 18px; border-radius: 12px; border: 1px solid #30363d;
            background: #000; color: var(--accent); font-size: 16px; outline: none;
            text-align: center; margin-top: 30px; font-family: monospace;
        }
        #browser-frame { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; border: none; display: none; z-index: 1; }
        .ui-hidden { transform: translateY(-100%); opacity: 0; }
    </style>
</head>
<body>
    <div id="portal-ui">
        <div class="container">
            <h1>GALAXIA</h1>
            <input type="text" id="urlInput" placeholder="ENTER LINK" autofocus>
        </div>
    </div>
    <iframe id="browser-frame" name="galaxia_window" sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-presentation allow-scripts allow-same-origin" allow="fullscreen; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; microphone; pointer-lock" allowfullscreen></iframe>

    <script>
        const PROXY_BASE = "https://galaxia.williampitcher347.workers.dev/?url=";
        const input = document.getElementById('urlInput');
        const ui = document.getElementById('portal-ui');
        const frame = document.getElementById('browser-frame');
        let currentHost = "";

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                let target = input.value.trim();
                if (target.includes('.')) {
                    if (!target.startsWith('http')) target = 'https://' + target;
                    try {
                        const urlObj = new URL(target);
                        currentHost = urlObj.origin; // Remembers you are on YouTube
                    } catch(e) {}
                    
                    frame.style.display = "block";
                    frame.contentWindow.location.replace(PROXY_BASE + encodeURIComponent(target));
                    ui.classList.add('ui-hidden');
                }
            }
        });

        // ESCAPE KEY
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                ui.classList.remove('ui-hidden');
                frame.style.display = "none";
                frame.src = "about:blank";
                input.focus();
            }
        });

        // The Fix: Auto-wrap redirects and searches
        setInterval(() => {
            try {
                const frameUrl = frame.contentWindow.location.href;
                if (frameUrl !== "about:blank" && !frameUrl.startsWith(PROXY_BASE)) {
                    // If the site tries to go to /results, we put the proxy and host back on it
                    let newUrl = frameUrl;
                    if (frameUrl.startsWith('https://galaxia-search.github.io/')) { 
                        newUrl = currentHost + frameUrl.replace('https://galaxia-search.github.io/', '');
                    }
                    frame.contentWindow.location.replace(PROXY_BASE + encodeURIComponent(newUrl));
                }
            } catch (e) {}
        }, 400);
    </script>
</body>
</html>
