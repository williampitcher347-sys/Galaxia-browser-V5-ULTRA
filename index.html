    <script>
        // PROXY LOGIC
        function launchProxy() {
            let target = document.getElementById('urlInput').value;
            if (!target) return;
            if (!target.startsWith('http')) target = 'https://' + target;
            
            // Your Worker URL
            const worker = "https://galaxia.williampitcher347.workers.dev";
            window.location.href = `${worker}?url=${encodeURIComponent(target)}`;
        }

        // CINEMATIC MESH SCRIPT
        const c = document.getElementById('mesh'), $ = c.getContext('2d');
        let w, h, pts = [];
        const init = () => {
            w = c.width = window.innerWidth;
            h = c.height = window.innerHeight;
            pts = [];
            for(let i=0; i<70; i++) pts.push({x:Math.random()*w, y:Math.random()*h, vx:(Math.random()-0.5)*0.4, vy:(Math.random()-0.5)*0.4});
        };
        const draw = () => {
            $.clearRect(0,0,w,h);
            $.fillStyle = '#444';
            pts.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0 || p.x>w) p.vx*=-1; if(p.y<0 || p.y>h) p.vy*=-1;
                $.beginPath(); $.arc(p.x, p.y, 1.2, 0, Math.PI*2); $.fill();
            });
            requestAnimationFrame(draw);
        };
        window.addEventListener('resize', init);
        init(); draw();
    </script>
