<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Drive - My Files</title> <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: white; overflow: hidden;
        }

        /* The Glass Search Bar */
        #navbar {
            position: fixed; top: 20px; left: 50%;
            transform: translateX(-50%);
            width: 80%; max-width: 600px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; gap: 10px; z-index: 1000;
            transition: 0.3s;
        }

        #navbar:hover { border-color: var(--primary); }

        input {
            flex: 1; background: transparent; border: none;
            color: white; outline: none; font-size: 16px;
        }

        button {
            background: var(--primary); border: none; color: white;
            padding: 8px 20px; border-radius: 25px; cursor: pointer;
            font-weight: bold; transition: 0.2s;
        }

        button:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* Full Screen Frame */
        #frame-container {
            width: 100vw; height: 100vh;
            background: #000;
        }

        iframe {
            width: 100%; height: 100%; border: none;
            display: block;
        }

        /* "Panic" Mode Overlay */
        #panic-screen {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: white;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <div id="panic-screen">
        <iframe src="https://www.google.com/search?q=educational+resources" style="width:100%; height:100%; border:none;"></iframe>
    </div>

    <div id="navbar">
        <input type="text" id="url-input" placeholder="Enter URL (e.g. quackprep.com) or search...">
        <button onclick="launch()">Launch</button>
    </div>

    <div id="frame-container">
        <iframe id="galaxia-engine" src="about:blank" allow="fullscreen; gamepad; autoplay; pointer-lock"></iframe>
    </div>

    <script>
        const proxyBase = "https://galaxia.williampitcher347.workers.dev/?url=";

        function launch() {
            let val = document.getElementById('url-input').value;
            if (!val) return;
            if (!val.startsWith('http')) val = 'https://' + val;
            
            document.getElementById('galaxia-engine').src = proxyBase + encodeURIComponent(val);
            document.getElementById('navbar').style.top = "-100px"; // Hide bar after launch
        }

        // Re-show search bar when mouse hits the top
        document.addEventListener('mousemove', (e) => {
            if (e.clientY < 50) document.getElementById('navbar').style.top = "20px";
        });

        // PANIC KEY: Pressing the Tilde (~) key hides everything
        document.addEventListener('keydown', (e) => {
            if (e.key === '`') {
                document.getElementById('panic-screen').style.display = 'block';
            }
        });
    </script>
</body>
</html>
