<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALAXIA V5 | ULTRA</title>
    <style>
        /* CORE SETUP */
        body, html { 
            margin: 0; padding: 0; 
            background: #050505; color: #fff; 
            font-family: 'Inter', sans-serif;
            height: 100%; overflow-x: hidden;
        }

        /* 1. THE MAIN INTERFACE LAYER */
        #main-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 50px;
        }

        .interface { 
            margin-top: 15vh;
            text-align: center; 
            background: #0a0a0a; 
            padding: 50px; 
            border: 1px solid #1a1a1a; 
            width: 90%; max-width: 600px;
            box-shadow: 0 0 50px #000;
        }

        h1 { font-weight: 100; letter-spacing: 15px; margin-bottom: 30px; }
        input { 
            background: #000; border: 1px solid #222; padding: 15px; 
            width: 80%; color: #0f0; text-align: center; margin-bottom: 20px; 
        }
        button { 
            background: #fff; color: #000; border: none; 
            padding: 12px 40px; cursor: pointer; font-size: 10px;
        }

        /* 2. THE SEPARATE AD LAYER (Pushed Down) */
        .ad-container {
            margin-top: 100px; /* Forces ads away from the search box */
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-top: 1px solid #111;
            padding: 40px 0;
        }

        /* 3. THE STEALTH PROXY LAYER (Hidden until launch) */
        #proxy-frame { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            border: none; 
            z-index: 10000; /* High Z-index to cover everything once active */
            background: #fff;
        }
    </style>
</head>
<body>

    <iframe id="proxy-frame" scrolling="yes" allowfullscreen></iframe>

    <div id="main-wrapper">
        
        <div class="interface">
            <h1>GALAXIA</h1>
            <p style="color:#333; letter-spacing:3px; font-size:10px;">V5 ULTRA // TITAN ENGINE</p>
            <input type="text" id="urlInput" placeholder="ENTER TARGET URL...">
            <br>
            <button onclick="launch()">INITIATE BYPASS</button>
        </div>

        <div class="ad-container">
            <p style="font-size:8px; color:#222; margin-bottom:15px;">SECURED SPONSOR NODE</p>
            <div id="container-8065ba5f7df2d0f53a2bb888f1df4b3a"></div>
            <script async="async" data-cfasync="false" src="https://pl28845318.effectivegatecpm.com/8065ba5f7df2d0f53a2bb888f1df4b3a/invoke.js"></script>
            </div>

    </div>

    <script>
        function launch() {
            let val = document.getElementById('urlInput').value.trim();
            if(!val) return;

            if(!val.includes('.')) val += ".com";
            if(!val.startsWith('http')) val = "https://" + val;

            const workerUrl = "https://galaxia.williampitcher347.workers.dev/?url=" + encodeURIComponent(val);
            
            // Activate the "Sticky" frame and hide the scrollable homepage
            document.getElementById('main-wrapper').style.display = 'none';
            const frame = document.getElementById('proxy-frame');
            frame.style.display = 'block';
            frame.src = workerUrl;

            window.history.pushState(null, null, window.location.href);
        }

        // Alt + Q Panic Key
        window.addEventListener('keydown', e => {
            if(e.key === 'Q' && e.altKey) window.location.href = "https://hwb.gov.wales/";
        });
    </script>
</body>
</html>
