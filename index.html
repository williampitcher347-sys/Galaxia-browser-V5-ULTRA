<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Google Drive</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; background: #050505; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; }

        /* Cinematic Background */
        #ui-layer {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; transition: opacity 0.8s ease;
        }

        .hero-text {
            font-size: 3rem; font-weight: 200; letter-spacing: 15px;
            margin-bottom: 40px; text-transform: uppercase;
            animation: fadeIn 3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; letter-spacing: 30px; } to { opacity: 1; letter-spacing: 15px; } }

        /* The Search Bar */
        .search-container {
            width: 500px; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; transition: 0.5s;
        }

        .search-container:focus-within { border-bottom: 1px solid #fff; width: 600px; }

        input {
            flex: 1; background: none; border: none; color: white;
            font-size: 1.2rem; outline: none; padding: 10px; font-weight: 200;
        }

        /* The Resulting Site */
        #viewport {
            display: none; width: 100vw; height: 100vh; border: none;
            position: absolute; top: 0; left: 0;
        }

        #back-btn {
            position: fixed; top: 10px; right: 10px; z-index: 100;
            background: rgba(0,0,0,0.5); color: #888; border: 1px solid #333;
            padding: 5px 10px; cursor: pointer; display: none; font-size: 10px;
        }
        #back-btn:hover { color: white; border-color: white; }
    </style>
</head>
<body>

    <button id="back-btn" onclick="location.reload()">TERMINATE</button>

    <div id="ui-layer">
        <div class="hero-text">GALAXIA</div>
        <div class="search-container">
            <input type="text" id="url-input" placeholder="ENTER TARGET URL..." autocomplete="off">
        </div>
        <p style="margin-top: 20px; color: #444; letter-spacing: 2px; font-size: 10px;">2K SEARCHES AND COUNTING</p>
    </div>

    <iframe id="viewport" allow="fullscreen; gamepad; pointer-lock"></iframe>

    <script>
        const input = document.getElementById('url-input');
        
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                launch(input.value);
            }
        });

        function launch(val) {
            if (!val) return;
            if (!val.startsWith('http')) val = 'https://' + val;

            const proxyUrl = "https://galaxia.williampitcher347.workers.dev/?url=" + encodeURIComponent(val);
            
            document.getElementById('ui-layer').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('ui-layer').style.display = 'none';
                const frame = document.getElementById('viewport');
                frame.src = proxyUrl;
                frame.style.display = 'block';
                document.getElementById('back-btn').style.display = 'block';
            }, 800);
        }
    </script>
</body>
</html>
